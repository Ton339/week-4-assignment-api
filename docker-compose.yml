version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tasks-db
    env_file:
      - .env
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shared_app_network
    healthcheck:
      # เพิ่ม -d ${POSTGRES_DB} เข้าไปด้านหลัง
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tasks-api
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - shared_app_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  shared_app_network:
    external: true
    name: shared_app_network

volumes:
  postgres_data:
